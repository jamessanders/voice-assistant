<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Voice Assistant</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    -webkit-user-select: none;
    user-select: none;
    cursor: default;
  }

  /* -- Tap-to-start overlay -- */
  #startOverlay {
    position: fixed;
    inset: 0;
    background: #0f1117;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.6s;
  }
  #startOverlay.hidden {
    opacity: 0;
    pointer-events: none;
  }
  #startOverlay h1 {
    font-size: 3rem;
    font-weight: 600;
    color: #f0f0f0;
    margin-bottom: 1.5rem;
  }
  #startOverlay p {
    font-size: 1.2rem;
    color: #666;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50%      { opacity: 1; }
  }

  /* -- Main content (hidden until started) -- */
  #main {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    padding: 2rem;
    gap: 2rem;
  }
  #main.active { display: flex; }

  /* -- Status orb -- */
  #statusOrb {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: #1e2030;
    border: 3px solid #2a2d3e;
    transition: background 0.4s, border-color 0.4s, box-shadow 0.4s;
    flex-shrink: 0;
  }
  #statusOrb.idle        { background: #1e2030; border-color: #2a2d3e; }
  #statusOrb.listening    { background: #1a3a2a; border-color: #34d399; box-shadow: 0 0 30px #34d39955; }
  #statusOrb.processing   { background: #2a2a1a; border-color: #fbbf24; box-shadow: 0 0 30px #fbbf2455; }
  #statusOrb.thinking     { background: #1a2a3a; border-color: #60a5fa; box-shadow: 0 0 30px #60a5fa55; }
  #statusOrb.speaking     { background: #2a1a3a; border-color: #a78bfa; box-shadow: 0 0 30px #a78bfa55; }

  #statusLabel {
    font-size: 1rem;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    flex-shrink: 0;
  }

  /* -- Content panel: holds the current interaction -- */
  #content {
    width: 100%;
    max-width: 800px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    transition: opacity 0.8s;
    opacity: 0;
    min-height: 0;
  }
  #content.visible { opacity: 1; }

  .content-block {
    width: 100%;
    text-align: center;
    transition: opacity 0.5s;
  }

  .content-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.5rem;
  }

  .content-text {
    font-size: 1.15rem;
    line-height: 1.6;
  }

  #heardBlock .content-label { color: #475569; }
  #heardBlock .content-text  { color: #94a3b8; }

  #queryBlock .content-label { color: #2563eb; }
  #queryBlock .content-text  { color: #60a5fa; font-size: 1.3rem; }

  #responseBlock .content-label { color: #7c3aed; }
  #responseBlock .content-text  { color: #c4b5fd; font-size: 1.3rem; }
</style>
</head>
<body>

<div id="startOverlay">
  <h1>Voice Assistant</h1>
  <p>Tap anywhere to start</p>
</div>

<div id="main">
  <div id="statusOrb" class="idle"></div>
  <div id="statusLabel">Listening</div>

  <div id="content">
    <div id="heardBlock" class="content-block" style="display:none">
      <div class="content-label">Heard</div>
      <div class="content-text" id="heardText"></div>
    </div>
    <div id="queryBlock" class="content-block" style="display:none">
      <div class="content-label">Query</div>
      <div class="content-text" id="queryText"></div>
    </div>
    <div id="responseBlock" class="content-block" style="display:none">
      <div class="content-label">Response</div>
      <div class="content-text" id="responseText"></div>
    </div>
  </div>
</div>

<script>
const CHUNK_SECONDS_DEFAULT   = 5;
const CHUNK_SECONDS_LISTENING = 2;
const SAMPLE_RATE   = 16000;
const CLEAR_DELAY_MS = 15000;

let chunkSeconds = CHUNK_SECONDS_DEFAULT;

let ws          = null;
let audioCtx    = null;
let micStream   = null;
let workletNode = null;
let pcmBuffer   = [];
let clearTimer  = null;

const startOverlay = document.getElementById("startOverlay");
const main         = document.getElementById("main");
const statusOrb    = document.getElementById("statusOrb");
const statusLabel  = document.getElementById("statusLabel");
const content      = document.getElementById("content");

const heardBlock    = document.getElementById("heardBlock");
const heardText     = document.getElementById("heardText");
const queryBlock    = document.getElementById("queryBlock");
const queryText     = document.getElementById("queryText");
const responseBlock = document.getElementById("responseBlock");
const responseText  = document.getElementById("responseText");

function setStatus(status, text) {
  statusOrb.className = status;
  statusLabel.textContent = text || status.charAt(0).toUpperCase() + status.slice(1);
}

function clearContent() {
  content.classList.remove("visible");
  setTimeout(() => {
    heardBlock.style.display = "none";
    queryBlock.style.display = "none";
    responseBlock.style.display = "none";
    heardText.textContent = "";
    queryText.textContent = "";
    responseText.textContent = "";
  }, 800);
}

function scheduleClear() {
  cancelClear();
  clearTimer = setTimeout(clearContent, CLEAR_DELAY_MS);
}

function cancelClear() {
  if (clearTimer) { clearTimeout(clearTimer); clearTimer = null; }
}

function showContent() {
  content.classList.add("visible");
}

function onTranscript(text) {
  cancelClear();
  heardText.textContent = text;
  heardBlock.style.display = "block";
  queryBlock.style.display = "none";
  responseBlock.style.display = "none";
  showContent();
}

function onQuery(text) {
  cancelClear();
  heardBlock.style.display = "none";
  queryText.textContent = text;
  queryBlock.style.display = "block";
  responseBlock.style.display = "none";
  showContent();
}

function onResponse(text) {
  cancelClear();
  queryBlock.style.display = "none";
  responseText.textContent = text;
  responseBlock.style.display = "block";
  showContent();
}

function onStatusChange(status, text) {
  setStatus(status, text);
  chunkSeconds = status === "listening" ? CHUNK_SECONDS_LISTENING : CHUNK_SECONDS_DEFAULT;
  if (status === "idle") {
    scheduleClear();
  } else {
    cancelClear();
  }
}

function connectWs() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.binaryType = "arraybuffer";

  ws.onopen = () => console.log("WebSocket connected");

  ws.onmessage = (event) => {
    if (typeof event.data === "string") {
      const msg = JSON.parse(event.data);
      if (msg.type === "status") {
        onStatusChange(msg.status, msg.text || "");
      } else if (msg.type === "transcript") {
        onTranscript(msg.text);
      } else if (msg.type === "query") {
        onQuery(msg.text);
      } else if (msg.type === "response") {
        onResponse(msg.text);
      } else if (msg.type === "ding") {
        playDing();
      }
    } else {
      playAudio(event.data);
    }
  };

  ws.onclose = () => {
    console.log("WebSocket closed, reconnecting in 2s...");
    setTimeout(connectWs, 2000);
  };

  ws.onerror = (err) => {
    console.error("WebSocket error:", err);
  };
}

function playDing() {
  const ctx = audioCtx || new AudioContext();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = "sine";
  osc.frequency.setValueAtTime(880, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.08);
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.25);
}

async function playAudio(arrayBuffer) {
  try {
    const blob = new Blob([arrayBuffer], { type: "audio/wav" });
    const url  = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.onended = () => URL.revokeObjectURL(url);
    await audio.play();
  } catch (e) {
    console.error("Audio playback error:", e);
  }
}

async function startMic() {
  audioCtx = new AudioContext({ sampleRate: SAMPLE_RATE });
  await audioCtx.audioWorklet.addModule("static/audio-processor.js");

  micStream = await navigator.mediaDevices.getUserMedia({
    audio: { sampleRate: SAMPLE_RATE, channelCount: 1, echoCancellation: true }
  });

  const source = audioCtx.createMediaStreamSource(micStream);
  workletNode = new AudioWorkletNode(audioCtx, "pcm-processor");

  workletNode.port.onmessage = (event) => {
    const samples = event.data;
    pcmBuffer.push(...samples);

    const samplesNeeded = chunkSeconds * SAMPLE_RATE;
    if (pcmBuffer.length >= samplesNeeded) {
      const chunk = new Float32Array(pcmBuffer.splice(0, samplesNeeded));
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(chunk.buffer);
      }
    }
  };

  source.connect(workletNode);
  workletNode.connect(audioCtx.destination);
}

async function begin() {
  startOverlay.classList.add("hidden");
  main.classList.add("active");
  connectWs();
  await startMic();
  setStatus("listening", "Listening");
}

startOverlay.addEventListener("click", begin, { once: true });
startOverlay.addEventListener("touchstart", (e) => {
  e.preventDefault();
  begin();
}, { once: true });
</script>
</body>
</html>
